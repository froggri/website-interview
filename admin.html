<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Website-Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #222;
      --accent: #7c6ef7;
      --accent-glow: rgba(124, 110, 247, 0.12);
      --accent-border: rgba(124, 110, 247, 0.28);
      --text: #e2e2ec;
      --text-muted: #6b7280;
      --border: #2a2a2a;
      --green: #10b981;
      --amber: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .screen { display: none; flex-direction: column; height: 100dvh; }
    .screen.active { display: flex; }

    /* ===== LOGIN ===== */

    #s-login {
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 360px;
      width: 100%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }

    .input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.93rem;
      padding: 11px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input::placeholder { color: #383848; }

    textarea.input { resize: vertical; min-height: 70px; line-height: 1.5; }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      font-family: inherit;
      transition: opacity .15s;
    }

    .btn-primary:hover { opacity: .88; }

    .err-msg { color: #fca5a5; font-size: 0.82rem; margin-top: 8px; min-height: 18px; }

    /* ===== TOPBAR ===== */

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .topbar-title { font-weight: 600; font-size: 0.92rem; flex: 1; }

    .btn-sm {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .btn-sm:hover { opacity: .88; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 6px 0;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s;
    }

    .btn-ghost:hover { color: var(--text); }

    /* ===== USER LIST ===== */

    .list-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .list-body::-webkit-scrollbar { width: 4px; }
    .list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 24px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .15s;
    }

    .user-card:hover { border-color: #3a3a4a; }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 600; font-size: 0.95rem; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

    .status-badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .04em;
    }

    .status-none  { background: rgba(107,114,128,.15); color: #9ca3af; }
    .status-active { background: rgba(245,158,11,.12); color: var(--amber); }
    .status-done   { background: rgba(16,185,129,.12); color: var(--green); }

    .card-date { font-size: 0.72rem; color: var(--text-muted); }

    .card-btns { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-outline {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: border-color .15s, color .15s;
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--text); }

    .btn-open {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: border-color .15s;
    }

    .btn-open:hover { border-color: var(--accent); }

    /* ===== DETAIL ===== */

    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
    }

    .detail-scroll::-webkit-scrollbar { width: 4px; }
    .detail-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-inner { max-width: 640px; margin: 0 auto; }

    .section { margin-bottom: 20px; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .link-code {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-copy-sm {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    .btn-copy-sm:hover { opacity: .85; }

    .question-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .q-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
      padding: 8px 12px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }

    .q-input:focus { border-color: var(--accent); }

    .q-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      transition: color .15s;
    }

    .q-remove:hover { color: #fca5a5; }

    .btn-add-q {
      background: transparent;
      color: var(--accent);
      border: 1px dashed var(--accent-border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      margin-top: 4px;
      transition: background .15s;
    }

    .btn-add-q:hover { background: var(--accent-glow); }

    /* ===== SESSION TIMELINE ===== */

    .session-empty { color: var(--text-muted); font-size: 0.85rem; font-style: italic; }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tl-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .tl-row.assistant { flex-direction: row; }
    .tl-row.user { flex-direction: row-reverse; }

    .tl-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 3px;
      min-width: 28px;
      text-align: right;
    }

    .tl-row.user .tl-label { text-align: left; }

    .tl-text {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 85%;
    }

    .tl-row.user .tl-text {
      background: var(--accent-glow);
      border-color: var(--accent-border);
    }

    .briefing-preview {
      background: rgba(16,185,129,.06);
      border: 1px solid rgba(16,185,129,.2);
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
    }

    .briefing-raw {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #86efac;
      white-space: pre-wrap;
      line-height: 1.6;
      margin: 8px 0;
      max-height: 200px;
      overflow-y: auto;
    }

    .btn-copy-briefing {
      background: rgba(16,185,129,.15);
      color: var(--green);
      border: 1px solid rgba(16,185,129,.3);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    .btn-copy-briefing:hover { background: rgba(16,185,129,.25); }

    /* ===== MODAL ===== */

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-bg.hidden { display: none; }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.2s ease;
    }

    .modal-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .modal-field-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-bottom: -6px; }

    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns .btn-primary { margin-top: 0; }

    .btn-cancel {
      flex: 1;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.93rem;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s;
    }

    .btn-cancel:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="s-login" class="screen">
    <div class="login-card">
      <div class="login-label">Admin</div>
      <h1>Zugang</h1>
      <input id="pw-input" type="password" class="input" placeholder="Passwort" />
      <button id="pw-btn" class="btn-primary">Anmelden →</button>
      <p id="pw-err" class="err-msg"></p>
    </div>
  </div>

  <!-- ===== USER LIST ===== -->
  <div id="s-list" class="screen">
    <div class="topbar">
      <span class="topbar-title">Kontakte</span>
      <button id="new-btn" class="btn-sm">+ Neuer Kontakt</button>
    </div>
    <div id="user-list" class="list-body"></div>
  </div>

  <!-- ===== DETAIL ===== -->
  <div id="s-detail" class="screen">
    <div class="topbar">
      <button id="back-btn" class="btn-ghost">← Alle Kontakte</button>
      <span id="detail-title" class="topbar-title"></span>
      <button id="save-btn" class="btn-sm">Speichern</button>
    </div>
    <div class="detail-scroll">
      <div class="detail-inner" id="detail-inner"></div>
    </div>
  </div>

  <!-- ===== MODAL: NEW USER ===== -->
  <div id="modal" class="modal-bg hidden">
    <div class="modal-card">
      <h3>Neuer Kontakt</h3>
      <div class="modal-field-label">Vorname *</div>
      <input id="new-name" type="text" class="input" placeholder="z. B. Micha" autocomplete="off" />
      <div class="modal-field-label">Kontext (optional)</div>
      <textarea id="new-ctx" class="input" rows="3" placeholder="Unternehmer, hat Firma XYZ, will Website für B2B-Kunden..."></textarea>
      <div class="modal-btns">
        <button id="modal-cancel" class="btn-cancel">Abbrechen</button>
        <button id="modal-ok" class="btn-primary" style="flex:1;margin-top:0">Erstellen →</button>
      </div>
    </div>
  </div>

  <script>
    let adminToken = sessionStorage.getItem('adminToken') || '';
    let users = [];
    let currentUser = null;
    let currentSession = null;

    const $ = id => document.getElementById(id);

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
    }

    async function apiFetch(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Token': adminToken,
          ...(opts.headers || {}),
        },
      });
      if (res.status === 401) {
        sessionStorage.removeItem('adminToken');
        adminToken = '';
        show('s-login');
        return null;
      }
      return res;
    }

    // ===== AUTH =====

    async function login() {
      const pw = $('pw-input').value.trim();
      if (!pw) return;
      const res = await fetch('/api/admin/users', { headers: { 'X-Admin-Token': pw } });
      if (res.ok) {
        adminToken = pw;
        sessionStorage.setItem('adminToken', pw);
        users = await res.json();
        renderList();
        show('s-list');
        $('pw-err').textContent = '';
      } else {
        $('pw-err').textContent = 'Falsches Passwort';
        $('pw-input').focus();
      }
    }

    // ===== USER LIST =====

    async function loadUsers() {
      const res = await apiFetch('/api/admin/users');
      if (!res) return;
      users = await res.json();
      renderList();
    }

    function statusInfo(user) {
      if (user.sessionStatus === 'completed') return { label: 'Abgeschlossen', cls: 'status-done' };
      if (user.sessionStatus === 'in_progress') return { label: 'Läuft', cls: 'status-active' };
      return { label: 'Kein Interview', cls: 'status-none' };
    }

    function renderList() {
      const container = $('user-list');
      container.innerHTML = '';

      if (users.length === 0) {
        container.innerHTML = '<div class="empty-state">Noch keine Kontakte.<br>Erstelle den ersten mit dem Button oben rechts.</div>';
        return;
      }

      users.forEach(user => {
        const { label, cls } = statusInfo(user);
        const date = new Date(user.createdAt).toLocaleDateString('de-DE');

        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="card-info">
            <div class="card-name">${user.name}</div>
            <div class="card-meta">
              <span class="status-badge ${cls}">${label}</span>
              <span class="card-date">Erstellt ${date}</span>
            </div>
          </div>
          <div class="card-btns">
            <button class="btn-outline" data-copy="${user.token}">Link kopieren</button>
            <button class="btn-open" data-open="${user.token}">Öffnen →</button>
          </div>
        `;

        card.querySelector('[data-copy]').addEventListener('click', e => {
          e.stopPropagation();
          copyLink(user.token, e.target);
        });

        card.querySelector('[data-open]').addEventListener('click', () => openUser(user));
        container.appendChild(card);
      });
    }

    function copyLink(token, btn) {
      const url = `${window.location.origin}?token=${token}`;
      navigator.clipboard.writeText(url).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Kopiert!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    }

    // ===== DETAIL =====

    async function openUser(user) {
      currentUser = user;
      currentSession = null;

      const res = await apiFetch(`/api/session?token=${user.token}`);
      if (res?.ok) {
        const data = await res.json();
        currentSession = data.session;
      }

      $('detail-title').textContent = user.name;
      renderDetail();
      show('s-detail');
    }

    function renderDetail() {
      const user = currentUser;
      const session = currentSession;
      const inner = $('detail-inner');
      inner.innerHTML = '';

      // Link section
      const link = `${window.location.origin}?token=${user.token}`;
      const linkSec = document.createElement('div');
      linkSec.className = 'section';
      linkSec.innerHTML = `
        <div class="section-label">Interview-Link</div>
        <div class="link-row">
          <code class="link-code">${link}</code>
          <button class="btn-copy-sm" id="copy-link-btn">Kopieren</button>
        </div>
      `;
      linkSec.querySelector('#copy-link-btn').onclick = function() {
        navigator.clipboard.writeText(link).then(() => {
          this.textContent = '✓ Kopiert!';
          setTimeout(() => { this.textContent = 'Kopieren'; }, 2000);
        });
      };
      inner.appendChild(linkSec);

      // Context section
      const ctxSec = document.createElement('div');
      ctxSec.className = 'section';
      ctxSec.innerHTML = `
        <div class="section-label">Kontext für ${user.name}</div>
        <textarea id="edit-context" class="input" rows="4" placeholder="z. B. Unternehmer, Firma XYZ, Website für B2B-Kunden, Budget ~5k...">${user.context || ''}</textarea>
      `;
      inner.appendChild(ctxSec);

      // Stakeholder questions
      const qSec = document.createElement('div');
      qSec.className = 'section';
      qSec.innerHTML = `<div class="section-label">Stakeholder-Fragen (von Claude PO / Philipp)</div>`;

      const qList = document.createElement('div');
      qList.id = 'q-list';
      (user.questions || []).forEach(q => addQuestionRow(qList, q));
      qSec.appendChild(qList);

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-q';
      addBtn.textContent = '+ Frage hinzufügen';
      addBtn.onclick = () => addQuestionRow(qList, '');
      qSec.appendChild(addBtn);
      inner.appendChild(qSec);

      // Session
      const sessSec = document.createElement('div');
      sessSec.className = 'section';
      sessSec.innerHTML = `<div class="section-label">Session</div>`;

      if (session?.messages?.length > 1) {
        const timeline = document.createElement('div');
        timeline.className = 'timeline';

        const msgToShow = session.messages.filter(m => !(m.role === 'user' && m.content === `Mein Name ist ${user.name}.`));
        msgToShow.forEach(msg => {
          const row = document.createElement('div');
          row.className = `tl-row ${msg.role}`;
          const label = msg.role === 'assistant' ? 'PO' : user.name;
          const text = typeof msg.content === 'string' ? msg.content : '[Bild hochgeladen]';
          row.innerHTML = `
            <span class="tl-label">${label}</span>
            <span class="tl-text">${text}</span>
          `;
          timeline.appendChild(row);
        });

        sessSec.appendChild(timeline);

        if (session.briefing) {
          const bEl = document.createElement('div');
          bEl.className = 'briefing-preview';
          bEl.innerHTML = `
            <div class="section-label" style="color:var(--green)">Briefing</div>
            <pre class="briefing-raw">${session.briefing}</pre>
            <button class="btn-copy-briefing">Briefing kopieren</button>
          `;
          bEl.querySelector('.btn-copy-briefing').onclick = function() {
            navigator.clipboard.writeText(session.briefing).then(() => {
              this.textContent = '✓ Kopiert!';
              setTimeout(() => { this.textContent = 'Briefing kopieren'; }, 2000);
            });
          };
          sessSec.appendChild(bEl);
        }
      } else {
        sessSec.innerHTML += '<p class="session-empty">Noch kein Interview geführt.</p>';
      }

      inner.appendChild(sessSec);
      inner.insertAdjacentHTML('beforeend', '<div style="height:40px"></div>');
    }

    function addQuestionRow(container, value) {
      const row = document.createElement('div');
      row.className = 'question-row';
      row.innerHTML = `
        <input type="text" class="q-input" value="${value.replace(/"/g, '&quot;')}" placeholder="z. B. Was ist dein Budget?" />
        <button class="q-remove" title="Entfernen">×</button>
      `;
      row.querySelector('.q-remove').onclick = () => row.remove();
      container.appendChild(row);
      const input = row.querySelector('.q-input');
      if (!value) input.focus();
    }

    async function saveCurrentUser() {
      const context = $('edit-context')?.value ?? '';
      const questions = Array.from(document.querySelectorAll('.q-input'))
        .map(i => i.value.trim())
        .filter(Boolean);

      const res = await apiFetch(`/api/admin/users?token=${currentUser.token}`, {
        method: 'PUT',
        body: JSON.stringify({ context, questions }),
      });

      if (res?.ok) {
        currentUser = { ...currentUser, context, questions };
        const idx = users.findIndex(u => u.token === currentUser.token);
        if (idx >= 0) users[idx] = currentUser;

        const btn = $('save-btn');
        btn.textContent = '✓ Gespeichert';
        setTimeout(() => { btn.textContent = 'Speichern'; }, 2000);
      }
    }

    // ===== MODAL =====

    function showModal() {
      $('modal').classList.remove('hidden');
      $('new-name').value = '';
      $('new-ctx').value = '';
      setTimeout(() => $('new-name').focus(), 50);
    }

    function hideModal() {
      $('modal').classList.add('hidden');
    }

    async function createUser() {
      const name = $('new-name').value.trim();
      if (!name) { $('new-name').focus(); return; }

      const context = $('new-ctx').value.trim();
      const res = await apiFetch('/api/admin/users', {
        method: 'POST',
        body: JSON.stringify({ name, context, questions: [] }),
      });

      if (!res?.ok) return;
      const user = await res.json();
      users.unshift(user);
      hideModal();
      openUser(user);
    }

    // ===== EVENTS =====

    $('pw-btn').onclick = login;
    $('pw-input').onkeydown = e => { if (e.key === 'Enter') login(); };

    $('new-btn').onclick = showModal;
    $('modal-cancel').onclick = hideModal;
    $('modal-ok').onclick = createUser;
    $('new-name').onkeydown = e => { if (e.key === 'Enter') createUser(); };
    $('modal').onclick = e => { if (e.target === $('modal')) hideModal(); };

    $('back-btn').onclick = async () => { await loadUsers(); show('s-list'); };
    $('save-btn').onclick = saveCurrentUser;

    // ===== INIT =====

    async function init() {
      if (!adminToken) { show('s-login'); $('pw-input').focus(); return; }
      const res = await fetch('/api/admin/users', { headers: { 'X-Admin-Token': adminToken } });
      if (res.ok) {
        users = await res.json();
        renderList();
        show('s-list');
      } else {
        sessionStorage.removeItem('adminToken');
        adminToken = '';
        show('s-login');
        $('pw-input').focus();
      }
    }

    init();
  </script>
</body>
</html>
